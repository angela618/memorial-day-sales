  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\n    width: 24px;\n    height: 24px;\n    border-radius: 50%;\n    background: var(--ink);\n    color: var(--paper);\n    display: grid;\n    place-items: center;\n    font-family: var(--font-display);\n    font-style: italic;\n    font-weight: 500;\n    font-size: 15px;\n    letter-spacing: 0;\n    line-height: 1;\n    padding-bottom: 1px;\n  }\n  .masthead .meta {\n    display: flex;\n    gap: 24px;\n    color: var(--ink-muted);\n  }\n  .meta-item strong { color: var(--ink); font-weight: 500; }\n\n  /* ---------- Editorial header ---------- */\n  .editorial {\n    padding: 64px 0 32px;\n    border-bottom: 0.5px solid var(--rule);\n    position: relative;\n  }\n  .editorial-kicker {\n    display: inline-flex;\n    align-items: center;\n    gap: 12px;\n    font-family: var(--font-label);\n    font-size: 11px;\n    font-weight: 500;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--accent);\n    margin-bottom: 24px;\n  }\n  .editorial-kicker::before,\n  .editorial-kicker::after {\n    content: \"\";\n    width: 24px;\n    height: 0.5px;\n    background: var(--accent);\n  }\n  .editorial-title {\n    font-family: var(--font-display);\n    font-weight: 500;\n    font-size: clamp(72px, 15vw, 240px);\n    line-height: 0.92;\n    letter-spacing: -0.035em;\n    margin: 0;\n    color: var(--ink);\n    font-feature-settings: \"liga\" 1, \"dlig\" 1;\n  }\n  .editorial-title .italic {\n    font-style: italic;\n    font-weight: 400;\n  }\n  .editorial-title .ampersand {\n    font-style: italic;\n    font-weight: 400;\n    font-size: 1.05em;\n    color: var(--accent);\n    letter-spacing: -0.04em;\n    padding: 0 0.04em 0 0.02em;\n    vertical-align: -0.02em;\n  }\n  .editorial-sub {\n    display: grid;\n    grid-template-columns: 1fr auto;\n    align-items: end;\n    gap: 32px;\n    margin-top: 32px;\n    padding-top: 20px;\n    border-top: 0.5px solid var(--rule);\n  }\n  .editorial-dek {\n    font-size: 17px;\n    line-height: 1.4;\n    color: var(--ink);\n    margin: 0;\n    max-width: 56ch;\n    font-weight: 400;\n    letter-spacing: -0.015em;\n  }\n  .editorial-dek em {\n    font-style: italic;\n    color: var(--ink-muted);\n  }\n  .editorial-stat {\n    text-align: right;\n    font-family: var(--font-label);\n    font-size: 11px;\n    letter-spacing: 0.12em;\n    text-transform: uppercase;\n    color: var(--ink-muted);\n    white-space: nowrap;\n  }\n  .editorial-stat .big {\n    font-family: var(--font-display);\n    font-size: 72px;\n    letter-spacing: -0.04em;\n    line-height: 0.9;\n    color: var(--ink);\n    display: block;\n    margin-bottom: 6px;\n    font-weight: 500;\n  }\n\n  /* ---------- Toolbar ---------- */\n  .toolbar {\n    display: flex;\n    align-items: center;\n    gap: 16px;\n    flex-wrap: wrap;\n    position: sticky;\n    top: 0;\n    z-index: 10;\n    padding: 24px 0 20px;\n    margin: 0 -40px;\n    padding-left: 40px;\n    padding-right: 40px;\n    background: linear-gradient(to bottom, var(--bg) 0%, var(--bg) 80%, rgba(251,250,247,0) 100%);\n  }\n  .search {\n    flex: 1 1 320px;\n    position: relative;\n    min-width: 0;\n  }\n  .search-icon {\n    position: absolute;\n    left: 18px;\n    top: 50%;\n    transform: translateY(-50%);\n    width: 16px;\n    height: 16px;\n    color: var(--ink-subtle);\n    pointer-events: none;\n  }\n  .search input {\n    width: 100%;\n    height: 52px;\n    padding: 0 52px 0 44px;\n    font: inherit;\n    font-family: var(--font-body);\n    font-size: 15px;\n    letter-spacing: -0.015em;\n    background: var(--paper);\n    color: var(--ink);\n    border: 0.5px solid var(--rule-strong);\n    border-radius: 0;\n    outline: none;\n    transition: border-color 0.15s ease, box-shadow 0.2s ease;\n  }\n  .search input::placeholder {\n    color: var(--ink-subtle);\n    font-style: italic;\n  }\n  .search input:focus {\n    border-color: var(--accent);\n    box-shadow: 0 4px 80px var(--accent-soft);\n  }\n  .search-clear {\n    position: absolute;\n    right: 14px;\n    top: 50%;\n    transform: translateY(-50%);\n    width: 28px;\n    height: 28px;\n    border: none;\n    background: transparent;\n    color: var(--ink-muted);\n    cursor: pointer;\n    border-radius: 50%;\n    display: none;\n    align-items: center;\n    justify-content: center;\n    font-size: 20px;\n    line-height: 1;\n    padding: 0;\n    font-family: var(--font-body);\n  }\n  .search-clear:hover { background: var(--hover-tint); color: var(--accent); }\n  .search.has-value .search-clear { display: flex; }\n\n  .count-badge {\n    display: inline-flex;\n    align-items: baseline;\n    gap: 8px;\n    padding: 0 18px;\n    height: 52px;\n    background: var(--ink);\n    color: var(--paper);\n    font-family: var(--font-label);\n    font-size: 11px;\n    font-weight: 500;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    white-space: nowrap;\n    font-variant-numeric: tabular-nums;\n  }\n  .count-badge .count-num {\n    font-family: var(--font-display);\n    font-size: 24px;\n    letter-spacing: -0.03em;\n    line-height: 1;\n    font-weight: 500;\n    font-style: italic;\n    position: relative;\n    top: 2px;\n  }\n  .count-badge .count-total { opacity: 0.5; }\n\n  /* ---------- Sections ---------- */\n  .section {\n    margin-top: 64px;\n  }\n  .section:first-of-type { margin-top: 40px; }\n  .section[hidden] { display: none; }\n\n  .section-head {\n    display: grid;\n    grid-template-columns: auto 1fr auto;\n    align-items: end;\n    gap: 24px;\n    margin-bottom: 24px;\n    padding-bottom: 16px;\n    border-bottom: 0.5px solid var(--rule-strong);\n  }\n  .section-num {\n    font-family: var(--font-display);\n    font-style: italic;\n    font-size: 16px;\n    letter-spacing: -0.02em;\n    color: var(--ink-muted);\n    line-height: 1;\n    padding-bottom: 10px;\n    font-weight: 400;\n  }\n  .section-name {\n    font-family: var(--font-display);\n    font-weight: 500;\n    font-size: clamp(36px, 5.2vw, 68px);\n    line-height: 0.95;\n    letter-spacing: -0.035em;\n    margin: 0;\n    color: var(--ink);\n  }\n  .section-count {\n    font-family: var(--font-label);\n    font-size: 11px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--ink-muted);\n    text-align: right;\n    line-height: 1.4;\n    padding-bottom: 8px;\n    font-variant-numeric: tabular-nums;\n  }\n  .section-count .count-figure {\n    font-family: var(--font-display);\n    font-style: italic;\n    font-size: 22px;\n    color: var(--ink);\n    display: inline-block;\n    margin-right: 4px;\n    letter-spacing: -0.02em;\n    font-weight: 400;\n    vertical-align: -2px;\n  }\n\n  /* ---------- Grid ---------- */\n  .grid {\n    display: grid;\n    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));\n    gap: 0;\n    border-top: 0.5px solid var(--rule);\n    border-left: 0.5px solid var(--rule);\n  }\n\n  /* ---------- Card ---------- */\n  .card {\n    display: flex;\n    flex-direction: column;\n    gap: 14px;\n    min-height: 168px;\n    padding: 22px 22px 20px;\n    background: var(--paper);\n    border-right: 0.5px solid var(--rule);\n    border-bottom: 0.5px solid var(--rule);\n    text-decoration: none;\n    color: inherit;\n    transition: background-color 0.2s ease, color 0.2s ease;\n    position: relative;\n  }\n  .card[hidden] { display: none; }\n  .card:hover {\n    background: var(--ink);\n    color: var(--paper);\n  }\n  .card:hover .card-sale { color: rgba(255,255,255,0.62); }\n  .card:hover .card-index { color: rgba(255,255,255,0.45); }\n  .card:hover .hl { color: var(--paper); }\n  .card:hover .card-arrow { color: var(--paper); transform: translate(2px, -2px); }\n  .card:focus-visible {\n    outline: none;\n    background: var(--accent);\n    color: var(--paper);\n  }\n  .card:focus-visible .card-sale { color: rgba(255,255,255,0.72); }\n  .card:focus-visible .card-index { color: rgba(255,255,255,0.5); }\n  .card:focus-visible .hl { color: var(--paper); }\n  .card:focus-visible .card-arrow { color: var(--paper); }\n\n  .card-top {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    gap: 12px;\n  }\n  .card-index {\n    font-family: var(--font-label);\n    font-size: 10px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--ink-subtle);\n    font-variant-numeric: tabular-nums;\n    white-space: nowrap;\n    transition: color 0.2s ease;\n  }\n  .card-arrow {\n    position: static;\n    width: 11px;\n    height: 11px;\n    flex-shrink: 0;\n    color: var(--ink-subtle);\n    transition: color 0.2s ease, transform 0.25s ease;\n  }\n  .card-name {\n    font-family: var(--font-display);\n    font-weight: 500;\n    font-size: 28px;\n    line-height: 1.0;\n    letter-spacing: -0.035em;\n    color: inherit;\n    text-wrap: balance;\n    word-break: break-word;\n  }\n\n  /* The sale line — inline editorial copy with the discount accented. */\n  .card-sale {\n    font-family: var(--font-body);\n    font-size: 13.5px;\n    font-weight: 400;\n    letter-spacing: -0.01em;\n    line-height: 1.3;\n    color: var(--ink-muted);\n    text-wrap: pretty;\n    margin-top: auto;\n    padding-top: 8px;\n    border-top: 0.5px solid var(--rule);\n    transition: color 0.2s ease, border-color 0.2s ease;\n  }\n  .card:hover .card-sale,\n  .card:focus-visible .card-sale { border-color: rgba(255,255,255,0.15); }\n\n  /* The discount itself — indigo italic display serif, sized to lead the eye. */\n  .hl {\n    font-family: var(--font-display);\n    font-style: italic;\n    font-weight: 500;\n    font-size: 1.6em;\n    letter-spacing: -0.03em;\n    color: var(--accent);\n    margin-right: 0.08em;\n    line-height: 1;\n    vertical-align: -0.04em;\n    transition: color 0.2s ease;\n    font-feature-settings: \"liga\" 1, \"dlig\" 1;\n  }\n\n  /* Long brand names get smaller */\n  .card-name[data-len=\"long\"] { font-size: 23px; line-height: 1.03; }\n  .card-name[data-len=\"xlong\"] { font-size: 18px; line-height: 1.08; letter-spacing: -0.02em; }\n\n  /* Highlight */\n  mark {\n    background: var(--accent-soft);\n    color: var(--accent);\n    border-radius: 0;\n    padding: 0 1px;\n    font-style: normal;\n  }\n  .card:hover mark, .card:focus-visible mark {\n    background: var(--paper);\n    color: var(--ink);\n  }\n\n  /* ---------- Empty state ---------- */\n  .empty {\n    display: none;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    text-align: center;\n    padding: 96px 24px;\n    margin-top: 48px;\n    border-top: 0.5px solid var(--rule);\n    border-bottom: 0.5px solid var(--rule);\n  }\n  .empty.visible { display: flex; }\n  .empty-mark {\n    font-family: var(--font-display);\n    font-style: italic;\n    font-size: 96px;\n    line-height: 1;\n    color: var(--accent);\n    margin-bottom: 16px;\n    font-weight: 400;\n  }\n  .empty-title {\n    font-family: var(--font-display);\n    font-size: 44px;\n    line-height: 1;\n    margin: 0 0 12px;\n    font-weight: 500;\n    letter-spacing: -0.03em;\n  }\n  .empty-title em { font-style: italic; font-weight: 400; }\n  .empty-body {\n    font-size: 15px;\n    color: var(--ink-muted);\n    margin: 0;\n    max-width: 36ch;\n    line-height: 1.5;\n  }\n  .empty-reset {\n    margin-top: 24px;\n    padding: 0 24px;\n    height: 44px;\n    font-family: var(--font-body);\n    font-weight: 500;\n    font-size: 14px;\n    letter-spacing: -0.015em;\n    background: var(--accent);\n    color: var(--paper);\n    border: none;\n    border-radius: 999px;\n    cursor: pointer;\n    transition: background-color 0.15s ease;\n  }\n  .empty-reset:hover { background: var(--accent-hover); }\n\n  /* ---------- Footer rule ---------- */\n  .colophon {\n    margin-top: 96px;\n    padding-top: 24px;\n    border-top: 0.5px solid var(--rule-strong);\n    display: flex;\n    justify-content: space-between;\n    gap: 24px;\n    font-family: var(--font-label);\n    font-size: 11px;\n    lette hild(arrow);\n\n        const name = document.createElement('div');\n        name.className = 'card-name';\n        name.dataset.text = b.name;\n        name.dataset.len = nameLen(b.name);\n        name.textContent = b.name;\n\n        const sale = document.createElement('div');\n        sale.className = 'card-sale';\n        sale.dataset.text = b.sale;\n        sale.innerHTML = emphasizeDeal(b.sale);\n\n        a.appendChild(top);\n        a.appendChild(name);\n        a.appendChild(sale);\n        grid.appendChild(a);\n      });\n\n      section.appendChild(grid);\n      frag.appendChild(section);\n    });\n\n    results.appendChild(frag);\n\n    // --- Search ---\n    const input = document.getElementById('search');\n    const searchWrap = document.getElementById('searchWrap');\n    const clearBtn = document.getElementById('clear');\n    const visibleEl = document.getElementById('visibleCount');\n    const empty = document.getElementById('empty');\n    const resetBtn = document.getElementById('resetBtn');\n\n    function escapeHtml(s) {\n      return s.replace(/[&<>\"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'})[c]);\n    }\n    function escapeRegex(s) {\n      return s.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&');\n    }\n    function highlight(text, q) {\n      if (!q) return escapeHtml(text);\n      const esc = escapeHtml(text);\n      const re = new RegExp('(' + escapeRegex(escapeHtml(q)) + ')', 'ig');\n      return esc.replace(re, '<mark>$1<\u002Fmark>');\n    }\n\n    function applySearch(rawQ) {\n      const q = rawQ.trim().toLowerCase();\n      searchWrap.classList.toggle('has-value', q.length > 0);\n      let totalVisible = 0;\n\n      document.querySelectorAll('.section').forEach(section => {\n        let secVisible = 0;\n        section.querySelectorAll('.card').forEach(card => {\n          const match = !q || card.dataset.name.includes(q) || card.dataset.sale.includes(q);\n          card.hidden = !match;\n          if (match) {\n            secVisible++;\n            const nameEl = card.querySelector('.card-name');\n            const saleEl = card.querySelector('.card-sale');\n            if (q) {\n              nameEl.innerHTML = highlight(nameEl.dataset.text, rawQ.trim());\n              saleEl.innerHTML = highlight(saleEl.dataset.text, rawQ.trim());\n            } else {\n              nameEl.textContent = nameEl.dataset.text;\n              saleEl.textContent = saleEl.dataset.text;\n            }\n          }\n        });\n        section.hidden = secVisible === 0;\n        const cntEl = section.querySelector('[data-role=\"sectionCount\"]');\n        const total = cntEl.dataset.total;\n        cntEl.innerHTML = '<span class=\"count-figure\">' + pad(secVisible) + '<\u002Fspan> of ' + pad(total) + ' Brands';\n        totalVisible += secVisible;\n      });\n\n      visibleEl.textContent = totalVisible;\n      empty.classList.toggle('visible', totalVisible === 0);\n    }\n\n    input.addEventListener('input', e => applySearch(e.target.value));\n    clearBtn.addEventListener('click', () => { input.value = ''; applySearch(''); input.focus(); });\n    resetBtn.addEventListener('click', () => { input.value = ''; applySearch(''); input.focus(); });\n\n    document.addEventListener('keydown', e => {\n      if (e.key === '/' && document.activeElement !== input) {\n        e.preventDefault();\n        input.focus();\n        input.select();\n      } else if (e.key === 'Escape' && document.activeElement === input && input.value) {\n        input.value = '';\n        applySearch('');\n      }\n    });\n  <\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
